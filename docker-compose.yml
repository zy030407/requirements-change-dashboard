services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: requirements_wiki
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d requirements_wiki"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      JOB_QUEUE_PROVIDER: bullmq
      JOB_QUEUE_PROCESS_IN_API: "false"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/requirements_wiki
    ports:
      - "4000:4000"
    command: sh -c "npm run prisma:migrate && npm start"

  worker:
    build: .
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      JOB_QUEUE_PROVIDER: bullmq
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/requirements_wiki
    command: npm run start:worker

volumes:
  postgres-data:
